<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A0A0A"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#FDC435"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#E74C3C"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="clip">
      <rect width="800" height="450"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="800" height="450" fill="url(#bg)"/>

    <!-- Ambient glow red/gold -->
    <ellipse cx="220" cy="200" rx="200" ry="180" fill="#C0392B" opacity="0.1" filter="url(#glow)"/>
    <ellipse cx="580" cy="260" rx="160" ry="130" fill="#FDC435" opacity="0.07" filter="url(#glow)"/>

    <!-- Diagonal accent stripe -->
    <polygon points="0,420 80,450 0,450" fill="#C0392B" opacity="0.4"/>
    <polygon points="760,0 800,0 800,60" fill="#FDC435" opacity="0.2"/>

    <!-- Browser bar -->
    <rect x="50" y="28" width="700" height="34" rx="8" fill="rgba(255,255,255,0.05)"/>
    <circle cx="76"  cy="45" r="5" fill="rgba(255,255,255,0.2)"/>
    <circle cx="94"  cy="45" r="5" fill="rgba(255,255,255,0.14)"/>
    <circle cx="112" cy="45" r="5" fill="rgba(255,255,255,0.09)"/>
    <rect x="136" y="36" width="340" height="18" rx="9" fill="rgba(255,255,255,0.06)"/>
    <text x="156" y="49" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">boxbuddy.app</text>

    <!-- LEFT SIDE: Hero copy -->
    <!-- Logo / badge -->
    <rect x="80" y="82" width="44" height="44" rx="10" fill="url(#redGrad)"/>
    <text x="102" y="111" font-family="Arial Black, sans-serif" font-size="22" font-weight="900" fill="#fff" text-anchor="middle">B</text>

    <text x="136" y="100" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#fff" letter-spacing="2" opacity="0.95">BOXBUDDY</text>
    <text x="136" y="116" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="3">CROSSFIT APP</text>

    <!-- Headline -->
    <text x="80" y="172" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#fff" letter-spacing="-0.5">Tu box,</text>
    <text x="80" y="206" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="url(#accentGrad)" letter-spacing="-0.5">en tu bolsillo.</text>

    <!-- Sub -->
    <text x="80" y="238" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Reservas, WODs y seguimiento de tu progreso.</text>
    <text x="80" y="256" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Todo en una sola app para tu comunidad CrossFit.</text>

    <!-- CTA buttons -->
    <rect x="80" y="278" width="136" height="38" rx="19" fill="url(#accentGrad)"/>
    <text x="148" y="301" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#0A0A0A" text-anchor="middle">Descargar gratis</text>

    <rect x="228" y="278" width="110" height="38" rx="19" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <text x="283" y="301" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="rgba(255,255,255,0.6)" text-anchor="middle">Ver demo</text>

    <!-- Small trust badges -->
    <text x="80" y="346" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">★★★★★  +500 atletas activos  ·  iOS &amp; Android</text>

    <!-- RIGHT SIDE: App mockup phone -->
    <!-- Phone frame -->
    <rect x="470" y="62" width="220" height="360" rx="28" fill="#111" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>
    <rect x="478" y="72" width="204" height="340" rx="22" fill="#0F0F0F"/>
    <!-- Notch -->
    <rect x="532" y="72" width="96" height="20" rx="10" fill="#111"/>
    <circle cx="580" cy="82" r="4" fill="#222"/>

    <!-- App screen content -->
    <!-- Top bar -->
    <text x="490" y="112" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#fff">Hola, Sara 👊</text>
    <text x="490" y="128" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.35)">Lunes · WOD disponible</text>

    <!-- WOD card -->
    <rect x="490" y="140" width="180" height="72" rx="12" fill="#1A0A0A"/>
    <rect x="490" y="140" width="4"   height="72" rx="2" fill="url(#redGrad)"/>
    <text x="504" y="158" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#C0392B" letter-spacing="2">WOD HOY</text>
    <text x="504" y="174" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">AMRAP 20 min</text>
    <text x="504" y="188" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.45)">10 Pull-ups · 20 Box jumps · 30 DU</text>
    <rect x="614" y="148" width="48" height="24" rx="12" fill="url(#accentGrad)"/>
    <text x="638" y="164" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#0A0A0A" text-anchor="middle">Unirse</text>

    <!-- Stats row -->
    <rect x="490" y="224" width="56" height="52" rx="10" fill="#191919"/>
    <text x="518" y="248" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#FDC435" text-anchor="middle">14</text>
    <text x="518" y="264" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Sesiones</text>

    <rect x="554" y="224" width="56" height="52" rx="10" fill="#191919"/>
    <text x="582" y="248" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle">92%</text>
    <text x="582" y="264" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Asistencia</text>

    <rect x="618" y="224" width="52" height="52" rx="10" fill="#1A0A0A"/>
    <text x="644" y="248" font-family="Arial Black, sans-serif" font-size="16" font-weight="900" fill="#C0392B" text-anchor="middle">🔥</text>
    <text x="644" y="264" font-family="Arial, sans-serif" font-size="8" fill="rgba(255,255,255,0.4)" text-anchor="middle">Racha</text>

    <!-- Next class -->
    <rect x="490" y="288" width="180" height="48" rx="10" fill="#151515"/>
    <text x="504" y="307" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.4)" letter-spacing="1">PRÓXIMA CLASE</text>
    <text x="504" y="324" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#fff">18:30 · Open Box</text>
    <text x="630" y="324" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">6/12 plazas</text>

    <!-- Bottom nav bar -->
    <rect x="478" y="356" width="204" height="56" rx="0" fill="#0D0D0D"/>
    <rect x="478" y="356" width="204" height="1"  fill="rgba(255,255,255,0.06)"/>
    <!-- Nav icons (simplified) -->
    <rect x="496" y="369" width="28" height="4" rx="2" fill="#FDC435"/>
    <rect x="496" y="377" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.2)"/>

    <rect x="556" y="369" width="28" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="556" y="377" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>

    <rect x="616" y="369" width="28" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="616" y="377" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.15)"/>

    <!-- Home indicator -->
    <rect x="554" y="398" width="52" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>
</svg>
